<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mock Test Leaderboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            background: url("https://images.unsplash.com/photo-1522202176988-66273c2fd55f") no-repeat center center/cover;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .leaderboard-card {
            background: rgba(255, 255, 255, 0.98);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            width: 700px; /* Wider to fit the table */
            text-align: center;
        }

        h2 {
            color: #1e3c72;
            margin-bottom: 25px;
            font-size: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        /* TABLE STYLING */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th {
            background-color: #1e3c72;
            color: white;
            padding: 15px;
            font-size: 1.1rem;
            text-transform: uppercase;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #ddd;
            font-size: 1.1rem;
            color: #333;
        }

        tr:nth-child(even) {
            background-color: #f9f9f9;
        }

        tr:hover {
            background-color: #f1f4f9;
        }

        .back-btn {
            display: inline-block;
            margin-top: 30px;
            text-decoration: none;
            background: #007bff;
            color: white;
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: 600;
            transition: 0.3s;
        }

        .back-btn:hover {
            background: #0056b3;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="leaderboard-card">
        <h2>Leaderboard 🏆</h2>

        <table>
            <thead>
                <tr>
                    <th>S.No</th>
                    <th>Name</th>
                    <th>Score</th>
                </tr>
            </thead>
            <tbody id="leaderboardData">
                <tr>
                    <td>1</td>
                    <td>Abinaya Saravan</td>
                    <td>5 / 5</td>
                </tr>
            </tbody>
        </table>

        <a href="dashboard.html" class="back-btn">Back to Dashboard</a>
    </div>

    <script>
        // Optional: Logic to show current user's score from localStorage
        window.onload = function() {
            const name = localStorage.getItem("userName") || "Abinaya Saravan";
            const score = localStorage.getItem("lastScore") || "0";
            
            const tableBody = document.getElementById("leaderboardData");
            tableBody.innerHTML = `
                <tr>
                    <td>1</td>
                    <td><strong>${name}</strong></td>
                    <td>${score} / 5</td>
                </tr>
                <tr>
                    <td>2</td>
                    <td>Guest User</td>
                    <td>3 / 5</td>
                </tr>
            `;
        }
    </script>

</body>
</html>
