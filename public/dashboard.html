<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      display: flex;
      background: #f4f6f9;
    }

    /* SIDEBAR */
    .sidebar {
      width: 220px;
      height: 100vh;
      background: #1e293b;
      color: white;
      padding: 20px;
      position: fixed;
    }

    .sidebar h2 {
      margin-bottom: 30px;
    }

    .sidebar a {
      display: block;
      color: white;
      padding: 10px;
      margin: 10px 0;
      text-decoration: none;
      border-radius: 6px;
    }

    .sidebar a:hover {
      background: #2563eb;
    }

    .sidebar i {
      margin-right: 10px;
    }

    /* MAIN */
    .main {
      margin-left: 240px;
      padding: 30px;
      width: 100%;
    }

    .main h1 {
      margin-bottom: 10px;
    }

    /* CARDS */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .card i {
      font-size: 24px;
      color: #2563eb;
      margin-bottom: 10px;
    }

    .card a {
      display: inline-block;
      margin-top: 10px;
      padding: 8px 12px;
      background: #2563eb;
      color: white;
      border-radius: 5px;
      text-decoration: none;
    }

    .card a:hover {
      background: #1e40af;
    }
  </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>Prep App</h2>

  <a href="#"><i class="fa fa-home"></i> Dashboard</a>
  <a href="subjects.html"><i class="fa fa-book"></i> Subjects</a>
  <a href="leaderboard.html"><i class="fa fa-trophy"></i> Leaderboard</a>
  <a href="profile.html"><i class="fa fa-user"></i> Profile</a>
  <a href="login.html"><i class="fa fa-sign-out"></i> Logout</a>
</div>

<!-- MAIN -->
<div class="main">

  <h1>Welcome 👋</h1>
  <p>Start your preparation now</p>

  <div class="grid">

    <div class="card">
      <i class="fa fa-pen"></i>
      <h3>Start Test</h3>
      <p>Practice mock tests</p>
      <a href="subjects.html">Start</a>
    </div>

    <div class="card">
      <i class="fa fa-chart-line"></i>
      <h3>Leaderboard</h3>
      <p>See top performers</p>
      <a href="leaderboard.html">View</a>
    </div>

    <div class="card">
      <i class="fa fa-info-circle"></i>
      <h3>Instructions</h3>
      <p>Read guidelines</p>
      <a href="instructions.html">Open</a>
    </div>

    <div class="card">
      <i class="fa fa-user"></i>
      <h3>Profile</h3>
      <p>Your account details</p>
      <a href="profile.html">View</a>
    </div>

  </div>

</div>

</body>
</html>
